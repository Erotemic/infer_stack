profiles:
  workstation-safe:
    description: Single model on the first non-display GPU.
    vllm:
      enable_responses_api_store: false
      logging_level: INFO
    services:
      - service_name: chat
        model: qwen3.5-9b
        placement:
          strategy: first_fit
          gpu_count: 1
    router:
      aliases:
        qwen3.5-9b: chat
  qwen3.5-0.8b-single:
    # Smallest synthetic Qwen3.5 model on one GPU — exercises the
    # planner/renderer with the smallest memory class. Does NOT pull
    # weights (Qwen3.5 is a synthetic catalog entry).
    description: Tiny Qwen3.5 0.8B on a single GPU; smallest CLI-runnable profile.
    vllm:
      enable_responses_api_store: false
      logging_level: INFO
    services:
      - service_name: chat
        model: qwen3.5-0.8b
        placement:
          strategy: first_fit
          gpu_count: 1
    router:
      aliases:
        qwen3.5-0.8b: chat

  # -- single-GPU profiles for real (HuggingFace-resolvable) models ----
  # These actually pull weights and start vLLM, so they're appropriate
  # for integration / smoke tests that verify the rendered stack works
  # end-to-end, not just the planner.
  gpt2-single:
    description: GPT-2 124M (completions-only) on one GPU; smallest plumbing test (~250 MB, no HF_TOKEN needed).
    vllm:
      enable_responses_api_store: false
      logging_level: INFO
    services:
      - service_name: chat
        model: gpt2
        protocol_mode: completions
        placement:
          strategy: first_fit
          gpu_count: 1
    router:
      aliases:
        gpt2: chat

  smollm2-135m-single:
    description: SmolLM2 135M Instruct on one GPU; smallest real-weights profile (~270 MB).
    vllm:
      enable_responses_api_store: false
      logging_level: INFO
    services:
      - service_name: chat
        model: smollm2-135m-instruct
        placement:
          strategy: first_fit
          gpu_count: 1
    router:
      aliases:
        smollm2-135m: chat

  qwen2.5-0.5b-instruct-single:
    description: Qwen2.5 0.5B Instruct on one GPU; smallest real Qwen for end-to-end tests.
    vllm:
      enable_responses_api_store: false
      logging_level: INFO
    services:
      - service_name: chat
        model: qwen2.5-0.5b-instruct
        placement:
          strategy: first_fit
          gpu_count: 1
    router:
      aliases:
        qwen2.5-0.5b: chat

  pythia-160m-single:
    description: Pythia 160M (completions-only) on one GPU; smallest real base-model profile.
    vllm:
      enable_responses_api_store: false
      logging_level: INFO
    services:
      - service_name: chat
        model: pythia-160m
        protocol_mode: completions
        placement:
          strategy: first_fit
          gpu_count: 1
    router:
      aliases:
        pythia-160m: chat

  pythia-410m-single:
    description: Pythia 410M (completions-only) on one GPU.
    vllm:
      enable_responses_api_store: false
      logging_level: INFO
    services:
      - service_name: chat
        model: pythia-410m
        protocol_mode: completions
        placement:
          strategy: first_fit
          gpu_count: 1
    router:
      aliases:
        pythia-410m: chat

  # -- hardware-shape test profiles ----------------------------------
  # Aim points for integration tests. The placement is ``first_fit`` so
  # CUDA_VISIBLE_DEVICES (or a future --allowed-gpus flag) can constrain
  # which GPU(s) the resolver actually places onto.
  test-single-11gb:
    # Designed to fit on a single ~11 GB GPU (e.g. a workstation 3080).
    # SmolLM2 leaves plenty of headroom; the runtime overrides keep KV
    # cache and concurrency low so multiple tests can run on the same
    # GPU without OOM.
    description: Integration-test profile for a single ~11 GB GPU; uses SmolLM2 135M.
    vllm:
      enable_responses_api_store: false
      logging_level: INFO
    services:
      - service_name: chat
        model: smollm2-135m-instruct
        placement:
          strategy: first_fit
          gpu_count: 1
        runtime:
          max_model_len: 2048
          gpu_memory_utilization: 0.5
          max_num_batched_tokens: 2048
          max_num_seqs: 8
          enable_prefix_caching: true
    router:
      aliases:
        smollm2-135m: chat

  test-multi-gpu:
    # Designed to exercise the multi-GPU (tensor-parallel) code path
    # cheaply. Qwen2.5-0.5B is small enough that the TP overhead
    # dominates serve time, but that's fine for a correctness test —
    # this is about validating the rendered TP=2 wiring, not throughput.
    description: Integration-test profile across 2 GPUs (TP=2); uses Qwen2.5 0.5B Instruct.
    vllm:
      enable_responses_api_store: false
      logging_level: INFO
    services:
      - service_name: chat
        model: qwen2.5-0.5b-instruct
        placement:
          strategy: first_fit
          gpu_count: 2
        topology:
          tensor_parallel_size: 2
        runtime:
          max_model_len: 4096
          gpu_memory_utilization: 0.6
          max_num_batched_tokens: 4096
          max_num_seqs: 8
          enable_prefix_caching: true
    router:
      aliases:
        qwen2.5-0.5b: chat

  qwen-mixed:
    description: Multiple Qwen models behind LiteLLM.
    vllm:
      enable_responses_api_store: false
      logging_level: INFO
    services:
      - service_name: qwen-27b
        model: qwen3.5-27b
        placement:
          strategy: first_fit
          gpu_count: 1
      - service_name: qwen-2b
        model: qwen3.5-2b
        placement:
          strategy: first_fit
          gpu_count: 1
      - service_name: qwen-122b
        model: qwen3.5-122b-a10b
        placement:
          strategy: first_fit
          gpu_count: 2
        topology:
          tensor_parallel_size: 2
    router:
      aliases:
        qwen3.5-27b: qwen-27b
        qwen3.5-2b: qwen-2b
        qwen3.5-122b: qwen-122b
  gemma-mixed:
    description: Mix small and medium Gemma 4 models behind LiteLLM.
    vllm:
      enable_responses_api_store: false
      logging_level: INFO
    services:
      - service_name: gemma-e4b
        model: gemma4-e4b
        placement:
          strategy: first_fit
          gpu_count: 1
      - service_name: gemma-31b
        model: gemma4-31b
        placement:
          strategy: first_fit
          gpu_count: 1
      - service_name: gemma-26b
        model: gemma4-26b
        placement:
          strategy: first_fit
          gpu_count: 1
    router:
      aliases:
        gemma4-e4b: gemma-e4b
        gemma4-31b: gemma-31b
        gemma4-26b: gemma-26b

  pythia-qwen3.6-mixed-4x96:
    description: "Serve Pythia 6.9B, Pythia 2.8B, and Qwen3.6-35B-A3B on a 4x96GB host."
    vllm:
      enable_responses_api_store: false
      logging_level: INFO
    services:
      - service_name: qwen36-35b
        model: qwen3.6-35b-a3b
        protocol_mode: chat
        placement:
          strategy: exact
          gpu_indices: [0, 1]
        topology:
          tensor_parallel_size: 2
        runtime:
          max_model_len: 262144
          gpu_memory_utilization: 0.95
          max_num_batched_tokens: 8192
          max_num_seqs: 8
          enable_prefix_caching: false
        reasoning:
          enabled: true
          parser: qwen3
          expose_to_openwebui: true
        # qwen3_coder matches the Qwen/Qwen3.6-35B-A3B model-card
        # recommendation. qwen3_xml is a manual fallback to try only if
        # qwen3_coder parses your specific tool calls poorly.
        tool_calling:
          enabled: true
          parser: qwen3_coder
        extra_args:
          - --language-model-only

      - service_name: pythia-69b
        model: pythia-6.9b
        protocol_mode: completions
        placement:
          strategy: exact
          gpu_indices: [2]
        runtime:
          max_model_len: 2048
          gpu_memory_utilization: 0.9
          max_num_batched_tokens: 2048
          max_num_seqs: 16
          enable_prefix_caching: false
        # LiteLLM-only adapter: flatten chat-shaped requests into a plain
        # prompt for chat-only clients (e.g. InspectAI MMLU). vLLM still
        # serves /v1/completions; no vLLM --chat-template is rendered.
        chat_compat:
          enabled: true
          strategy: flat_messages

      - service_name: pythia-28b
        model: pythia-2.8b-v0
        protocol_mode: completions
        placement:
          strategy: exact
          gpu_indices: [3]
        runtime:
          max_model_len: 2048
          gpu_memory_utilization: 0.9
          max_num_batched_tokens: 2048
          max_num_seqs: 16
          enable_prefix_caching: false
        chat_compat:
          enabled: true
          strategy: flat_messages

    router:
      aliases:
        qwen3.6-35b-a3b: qwen36-35b
        eleutherai/pythia-6.9b: pythia-69b
        eleutherai/pythia-2.8b-v0: pythia-28b

  qwen3.6-35b-a3b-dual-tp2-4x96:
    description: "Two Qwen3.6-35B-A3B tp=2 services across 4x96GB GPUs at 262k context."
    vllm:
      enable_responses_api_store: false
      logging_level: INFO
    services:
      - service_name: qwen36-35b-gpu01
        model: qwen3.6-35b-a3b
        served_model_name: qwen3.6-35b-a3b-gpu01
        protocol_mode: chat
        placement:
          strategy: exact
          gpu_indices: [0, 1]
        topology:
