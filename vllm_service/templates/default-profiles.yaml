          max_num_seqs: 8
          enable_prefix_caching: false
        reasoning:
          enabled: true
          parser: qwen3
          expose_to_openwebui: true
        extra_args:
          - --language-model-only

      - service_name: qwen36-35b-gpu23
        model: qwen3.6-35b-a3b
        served_model_name: qwen3.6-35b-a3b-gpu23
        protocol_mode: chat
        placement:
          strategy: exact
          gpu_indices: [2, 3]
        topology:
          tensor_parallel_size: 2
        runtime:
          max_model_len: 262144
          gpu_memory_utilization: 0.95
          max_num_batched_tokens: 8192
          max_num_seqs: 8
          enable_prefix_caching: false
        reasoning:
          enabled: true
          parser: qwen3
          expose_to_openwebui: true
        extra_args:
          - --language-model-only

    router:
      aliases:
        qwen3.6-35b-a3b-gpu01: qwen36-35b-gpu01
        qwen3.6-35b-a3b-gpu23: qwen36-35b-gpu23


  pythia-qwen25-gptoss-mixed-4x96:
    # Co-residency profile that brings up four audit-target models on a
    # single 4x96GB host. Layout:
    #   GPU 0  gpt-oss-20b              (~40 GiB, completions-protocol with chat_compat)
    #   GPU 1  qwen2.5-7b-instruct       (~16 GiB, chat-protocol)
    #   GPU 2  pythia-6.9b               (~16 GiB, completions-protocol)
    #   GPU 3  pythia-2.8b-v0            (~ 8 GiB, completions-protocol)
    #
    # The pythia services match the GPU pinning of
    # ``pythia-qwen3.6-mixed-4x96`` (the existing recipe used by another
    # ongoing experiment) so a host already running those two pythia
    # containers can be switched to this profile without disrupting the
    # pythia processes — only the qwen3.6-35b service rotates out and
    # the qwen2.5-7b + gpt-oss-20b services rotate in.
    #
    # Audience: the eval_audit ``finish_qwen25_gptoss`` preset uses this
    # profile to run the missing public-HELM benchmarks identified in
    # the Case Study 3 gap analysis (Qwen 2.5 7B on math + natural_qa +
    # the recipe-drifted reruns; gpt-oss 20B on the v1.12.0 / v1.14.0
    # capabilities and safety benchmarks).
    description: "Serve gpt-oss-20b + Qwen 2.5 7B Instruct + Pythia 6.9B + Pythia 2.8B on a 4x96GB host for the finish_qwen25_gptoss audit batch."
    vllm:
      enable_responses_api_store: false
      logging_level: INFO
    services:
      - service_name: gpt-oss-20b
        model: gpt-oss-20b
        # Match the existing ``gpt-oss-20b-completions`` audit profile
        # that the standalone ``gpt_oss_20b_vllm`` preset uses. HELM's
        # OpenAI-compatible client wires ``model_deployment=
        # litellm/gpt-oss-20b-local`` to /v1/completions; the gpt-oss
        # Harmony chat format puts reasoning tokens in
        # ``message.reasoning_content`` and leaves ``message.content``
        # as None for some prompts, which crashes HELM scorers like
        # ifeval that read ``completions[0].text``. Serving completions
        # avoids the chat split entirely, and the chat_compat shim
        # below preserves chat-shaped client compatibility through
        # LiteLLM's flat-message translation.
        protocol_mode: completions
        placement:
          strategy: exact
          gpu_indices: [0]
        runtime:
          # gpt-oss-20b on a single 96GB GPU. 32k context matches the
          # default-models entry; the safety benchmarks
          # (xstest, harm_bench) all stay well under that budget.
          max_model_len: 32768
          gpu_memory_utilization: 0.9
          max_num_batched_tokens: 8192
          max_num_seqs: 16
          enable_prefix_caching: true
        chat_compat:
          enabled: true
          strategy: flat_messages

      - service_name: qwen25-7b
        model: qwen2.5-7b-instruct
        protocol_mode: chat
        placement:
          strategy: exact
          gpu_indices: [1]
        runtime:
          # Match the qwen2-5-7b-instruct-turbo-default audit profile's
          # implicit defaults; 32k context is plenty for the missing
          # math + natural_qa benchmarks the audit needs.
          max_model_len: 32768
          gpu_memory_utilization: 0.9
          max_num_batched_tokens: 8192
          max_num_seqs: 16
          enable_prefix_caching: true

      - service_name: pythia-69b
        model: pythia-6.9b
        protocol_mode: completions
        placement:
          strategy: exact
          gpu_indices: [2]
        runtime:
          max_model_len: 2048
          gpu_memory_utilization: 0.9
          max_num_batched_tokens: 2048
          max_num_seqs: 16
          enable_prefix_caching: false
        # Same chat_compat shim the pythia-qwen3.6-mixed-4x96 profile
        # uses so InspectAI / Inspect Evals MMLU stays unblocked while
        # this profile is active.
        chat_compat:
          enabled: true
          strategy: flat_messages

      - service_name: pythia-28b
        model: pythia-2.8b-v0
        protocol_mode: completions
        placement:
          strategy: exact
          gpu_indices: [3]
        runtime:
          max_model_len: 2048
          gpu_memory_utilization: 0.9
          max_num_batched_tokens: 2048
          max_num_seqs: 16
          enable_prefix_caching: false
        chat_compat:
          enabled: true
          strategy: flat_messages

    router:
      aliases:
        # Public-facing aliases used by the eval-audit run_entries
        # (see the finish_qwen25_gptoss preset). The aliases exactly
        # match the model_deployment names HELM expects so that
        # run_specs from public HELM can be reused with only the
        # ``model_deployment=...`` qualifier swapped to the local
        # litellm route.
        openai/gpt-oss-20b: gpt-oss-20b
        qwen/qwen2.5-7b-instruct-turbo: qwen25-7b
        eleutherai/pythia-6.9b: pythia-69b
        eleutherai/pythia-2.8b-v0: pythia-28b


  pythia-llama2-70b-mixed-4x96:
    # Co-residency profile that brings up LLaMA-2-70B (fp16, tp=2) and
    # the two Pythia services on a single 4x96GB host for the
    # heatmap-paper Case Study 3 LLaMA-2 reproduction. Layout:
    #   GPU 0+1 llama-2-70b    (~140 GiB total via tp=2, completions)
    #   GPU 2   pythia-6.9b    (~16 GiB, completions w/ chat_compat)
    #   GPU 3   pythia-2.8b-v0 (~ 8 GiB, completions w/ chat_compat)
    #
    # Why this layout (vs. modifying ``pythia-qwen25-gptoss-mixed-4x96``):
    # LLaMA-2-70B at fp16 needs both GPUs 0 and 1 for tp=2, which
    # evicts the gpt-oss-20b service that lives on GPU 0 in the
    # qwen25-gptoss profile. Public HELM ran LLaMA-2-70B at fp16, so
    # using tp=2 (rather than INT4/AWQ on a single GPU) keeps the
    # local recipe matched to the public recipe — no quantization
    # confound in the reproducibility comparison. gpt-oss work
    # continues to use the qwen25-gptoss profile when needed.
    #
    # The Pythia GPU pinning matches both ``pythia-qwen3.6-mixed-4x96``
    # and ``pythia-qwen25-gptoss-mixed-4x96``, so a host already
    # running those Pythia containers can be switched to this profile
    # without disrupting in-flight Pythia work — only the GPU 0/1
    # services rotate.
    description: "Serve LLaMA-2-70B (fp16, tp=2) + Pythia 6.9B + Pythia 2.8B on a 4x96GB host for the LLaMA-2-70B audit batch."
    vllm:
      enable_responses_api_store: false
      logging_level: INFO
    services:
      - service_name: llama2-70b
        model: llama-2-70b
        protocol_mode: completions
        placement:
          strategy: exact
          gpu_indices: [0, 1]
        topology:
          tensor_parallel_size: 2
        runtime:
          # Match the public HELM v0.3.0 LLaMA-2-70B recipe: 4096
          # context, no chat template (base model). Chat-shaped clients
          # get the same flat_messages compat shim Pythia uses.
          max_model_len: 4096
          gpu_memory_utilization: 0.9
          max_num_batched_tokens: 4096
          max_num_seqs: 8
          enable_prefix_caching: true
        chat_compat:
          enabled: true
          strategy: flat_messages

      - service_name: pythia-69b
        model: pythia-6.9b
        protocol_mode: completions
        placement:
          strategy: exact
          gpu_indices: [2]
        runtime:
          max_model_len: 2048
          gpu_memory_utilization: 0.9
          max_num_batched_tokens: 2048
          max_num_seqs: 16
          enable_prefix_caching: false
        chat_compat:
          enabled: true
          strategy: flat_messages

      - service_name: pythia-28b
        model: pythia-2.8b-v0
        protocol_mode: completions
        placement:
          strategy: exact
          gpu_indices: [3]
        runtime:
          max_model_len: 2048
          gpu_memory_utilization: 0.9
          max_num_batched_tokens: 2048
          max_num_seqs: 16
          enable_prefix_caching: false
        chat_compat:
          enabled: true
          strategy: flat_messages

    router:
      aliases:
        meta/llama-2-70b: llama2-70b
        eleutherai/pythia-6.9b: pythia-69b
        eleutherai/pythia-2.8b-v0: pythia-28b


  gemma4-26b-workstation:
    description: "Efficient default for agentic coding and general chat on a 4x96GB server."
    vllm:
      enable_responses_api_store: false
      logging_level: INFO
    services:
      - name: gemma-main
        model: gemma4-26b
        served_model_name: gemma4-26b
        placement:
          strategy: single_gpu
          gpu_indices: [0]
          prefer_homogeneous_group: true
        topology:
          tp: 1
          dp: 1
        runtime:
          max_model_len: 32768
          gpu_memory_utilization: 0.9
          max_num_seqs: 8
          max_num_batched_tokens: 8192
          enable_prefix_caching: true
          enable_chunked_prefill: true
          reasoning_history_policy: final_only

    router:
      aliases:
        gemma4-26b: gemma-main

    policy:
      require_fit_validation: true
      minimum_vram_headroom_gib: 8
      allow_unsupported_render: false

